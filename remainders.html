<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>All Reminders | Remainder</title>

    <!-- Bootstrap 5 -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->

    <link rel="stylesheet"
          href="css/remainders.css">

</head>

<body>

    <!-- ======================================
         NAVBAR
    ======================================= -->

    <nav class="navbar navbar-expand-lg premium-navbar">

        <div class="container">

            <a class="navbar-brand logo"
               href="home.html">

                💜 Remainder

            </a>

            <div class="d-flex align-items-center gap-2">

                <button id="themeBtn"
                        class="theme-btn">

                    🌙

                </button>

                <a href="home.html"
                   class="btn btn-light rounded-pill">

                    <i class="bi bi-house"></i>

                </a>

            </div>

        </div>

    </nav>

    <!-- ======================================
         MAIN
    ======================================= -->

    <div class="container py-4">

        <!-- Header -->

        <div class="page-header glass-card">

            <h1>
                <i class="bi bi-list-task"></i>
                Reminder Center
            </h1>

            <p>
                View, search, filter and manage all your reminders.
            </p>

        </div>

        <!-- ======================================
             STATS
        ======================================= -->

        <div class="row g-3 mt-2">

            <div class="col-lg-3 col-md-6">

                <div class="stats-card">

                    <h2 id="allCount">0</h2>

                    <p>All Reminders</p>

                </div>

            </div>

            <div class="col-lg-3 col-md-6">

                <div class="stats-card">

                    <h2 id="pendingCount">0</h2>

                    <p>Pending</p>

                </div>

            </div>

            <div class="col-lg-3 col-md-6">

                <div class="stats-card">

                    <h2 id="completedCount">0</h2>

                    <p>Completed</p>

                </div>

            </div>

            <div class="col-lg-3 col-md-6">

                <div class="stats-card">

                    <h2 id="overdueCount">0</h2>

                    <p>Overdue</p>

                </div>

            </div>

        </div>

        <!-- ======================================
             SEARCH
        ======================================= -->

        <div class="glass-card search-section mt-4">

            <div class="input-group">

                <span class="input-group-text">

                    <i class="bi bi-search"></i>

                </span>

                <input type="text"
                       id="searchInput"
                       class="form-control"
                       placeholder="Search reminders...">

            </div>

        </div>

        <!-- ======================================
             FILTERS
        ======================================= -->

        <div class="glass-card filter-section mt-4">

            <div class="row g-3">

                <div class="col-md-6">

                    <label class="form-label">
                        Filter
                    </label>

                    <select id="filterSelect"
                            class="form-select">

                        <option value="all">
                            All Reminders
                        </option>

                        <option value="pending">
                            Pending
                        </option>

                        <option value="completed">
                            Completed
                        </option>

                        <option value="today">
                            Today
                        </option>

                        <option value="upcoming">
                            Upcoming
                        </option>

                        <option value="overdue">
                            Overdue
                        </option>

                        <option value="high">
                            High Priority
                        </option>

                        <option value="medium">
                            Medium Priority
                        </option>

                        <option value="low">
                            Low Priority
                        </option>

                    </select>

                </div>

                <div class="col-md-6">

                    <label class="form-label">
                        Sort By
                    </label>

                    <select id="sortSelect"
                            class="form-select">

                        <option value="dateAsc">
                            Due Date (Nearest)
                        </option>

                        <option value="dateDesc">
                            Due Date (Latest)
                        </option>

                        <option value="priority">
                            Priority
                        </option>

                        <option value="created">
                            Recently Created
                        </option>

                    </select>

                </div>

            </div>

        </div>

        <!-- ======================================
             REMINDER LIST
        ======================================= -->

        <div class="mt-4">

            <div id="reminderContainer"
                 class="row g-4">

                <!-- JS will insert cards -->

            </div>

        </div>

    </div>

    <!-- ======================================
         FLOATING ADD BUTTON
    ======================================= -->

    <a href="add_remainders.html"
       class="floating-add">

        <i class="bi bi-plus-lg"></i>

    </a>

    <!-- Bootstrap -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->

    <script src="js/remainders.js"></script>

</body>

</html>
