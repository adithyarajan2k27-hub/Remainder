<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Add Reminder</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->

    <link rel="stylesheet"
        href="css/add_remainders.css">

</head>

<body>

    <!-- Animated Background -->

    <div class="bg-animation"></div>

    <!-- Navbar -->

    <nav class="navbar premium-navbar">

        <div class="container">

            <a href="home.html"
                class="navbar-brand logo">

                💜 Remainder

            </a>

            <button id="themeBtn"
                class="theme-btn">

                🌙

            </button>

        </div>

    </nav>

    <!-- Main -->

    <div class="container py-5">

        <div class="glass-card reminder-container">

            <!-- Header -->

            <div class="header-section">

                <div class="header-icon">
                    ✨
                </div>

                <h1>
                    Create Reminder
                </h1>

                <p>
                    Plan smarter. Stay organized. Never miss important moments.
                </p>

            </div>

            <!-- Form -->

            <form id="reminderForm">

                <!-- Title -->

                <div class="mb-4">

                    <label class="form-label">
                        Reminder Title
                    </label>

                    <input
                        type="text"
                        id="title"
                        class="form-control premium-input"
                        placeholder="Enter reminder title"
                        required>

                </div>

                <!-- Description -->

                <div class="mb-4">

                    <label class="form-label">
                        Description
                    </label>

                    <textarea
                        id="description"
                        rows="4"
                        class="form-control premium-input"
                        placeholder="Add some details..."></textarea>

                </div>

                <!-- Date & Time -->

                <div class="row">

                    <div class="col-md-6 mb-4">

                        <label class="form-label">
                            Date
                        </label>

                        <input
                            type="date"
                            id="date"
                            class="form-control premium-input"
                            required>

                    </div>

                    <div class="col-md-6 mb-4">

                        <label class="form-label">
                            Time
                        </label>

                        <input
                            type="time"
                            id="time"
                            class="form-control premium-input"
                            required>

                    </div>

                </div>

                <!-- Priority -->

                <div class="mb-4">

                    <label class="form-label">
                        Priority
                    </label>

                    <div class="chip-group">

                        <button
                            type="button"
                            class="chip priority-chip active"
                            data-value="High">

                            🔴 High

                        </button>

                        <button
                            type="button"
                            class="chip priority-chip"
                            data-value="Medium">

                            🟡 Medium

                        </button>

                        <button
                            type="button"
                            class="chip priority-chip"
                            data-value="Low">

                            🟢 Low

                        </button>

                    </div>

                </div>

                <!-- Category -->

                <div class="mb-4">

                    <label class="form-label">
                        Category
                    </label>

                    <div class="category-grid">

                        <button
                            type="button"
                            class="category-card active"
                            data-value="Study">

                            📚
                            <span>Study</span>

                        </button>

                        <button
                            type="button"
                            class="category-card"
                            data-value="Work">

                            💼
                            <span>Work</span>

                        </button>

                        <button
                            type="button"
                            class="category-card"
                            data-value="Personal">

                            🏠
                            <span>Personal</span>

                        </button>

                        <button
                            type="button"
                            class="category-card"
                            data-value="Health">

                            ❤️
                            <span>Health</span>

                        </button>

                    </div>

                </div>

                <!-- Hidden Values -->

                <input
                    type="hidden"
                    id="priority"
                    value="High">

                <input
                    type="hidden"
                    id="category"
                    value="Study">

                <!-- Buttons -->

                <div class="button-group">

                    <button
                        type="submit"
                        class="save-btn">

                        <i class="bi bi-check-circle-fill"></i>

                        Save Reminder

                    </button>

                    <a href="home.html"
                        class="back-btn">

                        <i class="bi bi-arrow-left-circle-fill"></i>

                        Dashboard

                    </a>

                </div>

            </form>

        </div>

    </div>

    <!-- Bootstrap -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->

    <script src="js/add_remainders.js"></script>

</body>

</html>
