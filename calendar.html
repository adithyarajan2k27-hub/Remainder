<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Calendar | Remainder</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Calendar CSS -->

    <link rel="stylesheet"
        href="css/calendar.css">

</head>

<body>

    <!-- ==========================================
         NAVBAR
    =========================================== -->

    <nav class="navbar navbar-expand-lg premium-navbar">

        <div class="container">

            <a class="navbar-brand logo"
                href="home.html">

                💜 Remainder

            </a>

            <div class="d-flex align-items-center gap-2">

                <a href="home.html"
                    class="nav-btn">

                    <i class="bi bi-house"></i>

                </a>

                <button id="themeBtn"
                    class="theme-btn">

                    🌙

                </button>

            </div>

        </div>

    </nav>

    <!-- ==========================================
         PAGE HEADER
    =========================================== -->

    <div class="container mt-4">

        <div class="header-card glass-card">

            <div>

                <h1>
                    <i class="bi bi-calendar3"></i>
                    Calendar
                </h1>

                <p>
                    Organize your schedule, deadlines and streaks.
                </p>

            </div>

            <button id="todayBtn"
                class="today-btn">

                Today
            </button>

        </div>

    </div>

    <!-- ==========================================
         MAIN CONTENT
    =========================================== -->

    <div class="container mt-4 mb-5">

        <div class="row g-4">

            <!-- ==========================
                 CALENDAR SECTION
            =========================== -->

            <div class="col-xl-8">

                <div class="calendar-card glass-card">

                    <!-- Month Controls -->

                    <div class="calendar-header">

                        <button id="prevMonth"
                            class="month-btn">

                            <i class="bi bi-chevron-left"></i>

                        </button>

                        <h2 id="monthYear">

                            July 2026

                        </h2>

                        <button id="nextMonth"
                            class="month-btn">

                            <i class="bi bi-chevron-right"></i>

                        </button>

                    </div>

                    <!-- Week Days -->

                    <div class="weekdays">

                        <div>Sun</div>
                        <div>Mon</div>
                        <div>Tue</div>
                        <div>Wed</div>
                        <div>Thu</div>
                        <div>Fri</div>
                        <div>Sat</div>

                    </div>

                    <!-- Calendar Grid -->

                    <div id="calendarGrid">

                        <!-- JS Generates Calendar -->

                    </div>

                    <!-- Legend -->

                    <div class="calendar-legend">

                        <div class="legend-item">

                            <span class="legend today-dot"></span>

                            Today

                        </div>

                        <div class="legend-item">

                            <span class="legend remainder-dot"></span>

                            Upcoming

                        </div>

                        <div class="legend-item">

                            <span class="legend completed-dot"></span>

                            Completed

                        </div>

                        <div class="legend-item">

                            <span class="legend overdue-dot"></span>

                            Overdue

                        </div>

                        <div class="legend-item">

                            <span class="legend streak-dot"></span>

                            Streak

                        </div>

                    </div>

                </div>

            </div>

            <!-- ==========================
                 SIDEBAR
            =========================== -->

            <div class="col-xl-4">

                <!-- Search -->

                <div class="glass-card sidebar-card">

                    <h4>

                        <i class="bi bi-search"></i>

                        Search

                    </h4>

                    <input
                        type="text"
                        id="searchRemainder"
                        class="form-control"
                        placeholder="Search remainders...">

                </div>

                <!-- Stats -->

                <div class="glass-card sidebar-card mt-4">

                    <h4>

                        <i class="bi bi-bar-chart"></i>

                        Overview

                    </h4>

                    <div class="stats-list">

                        <div class="stat-row">

                            <span>
                                Today's Tasks
                            </span>

                            <strong id="todayTasks">
                                0
                            </strong>

                        </div>

                        <div class="stat-row">

                            <span>
                                Upcoming
                            </span>

                            <strong id="upcomingTasks">
                                0
                            </strong>

                        </div>

                        <div class="stat-row">

                            <span>
                                Completed
                            </span>

                            <strong id="completedTasks">
                                0
                            </strong>

                        </div>

                        <div class="stat-row">

                            <span>
                                Streak
                            </span>

                            <strong id="streakCount">
                                🔥0
                            </strong>

                        </div>

                    </div>

                </div>

                <!-- Selected Date -->

                <div class="glass-card sidebar-card mt-4">

                    <h4>

                        <i class="bi bi-calendar-event"></i>

                        Selected Date

                    </h4>

                    <div id="selectedDate">

                        Select a day from the calendar

                    </div>

                </div>

                <!-- Day Remainders -->

                <div class="glass-card sidebar-card mt-4">

                    <h4>

                        <i class="bi bi-list-check"></i>

                        Day Remainders

                    </h4>

                    <div id="dayRemainders">

                        No date selected

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- ==========================================
         FLOATING ADD BUTTON
    =========================================== -->

    <a href="add_remainders.html"
        class="floating-add">

        <i class="bi bi-plus-lg"></i>

    </a>

    <!-- Bootstrap -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Calendar JS -->

    <script src="js/calendar.js"></script>

</body>

</html>
